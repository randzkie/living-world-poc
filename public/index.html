<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Living World</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link
  href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:wght@400;500;600&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon">🛡️</span>
      <div>
        <h1>Living World</h1>
        <p class="tagline">A small medieval town of villagers with their own senses and memory</p>
      </div>
    </div>
    <div class="status">
      <span id="tickCount">tick 0</span>
      <span id="connDot" class="dot"></span>
      <span id="connLabel">connecting…</span>
    </div>
  </header>

  <main class="layout">
    <div id="gameContainer" class="stage"></div>
    <aside id="inspector" class="inspector">
      <div class="inspector-empty">
        <span class="inspector-icon">👁️</span>
        Click a villager to see their thoughts, plan, and memories.
      </div>
    </aside>
  </main>

  <section class="chronicle-panel">
    <h2>Village Chronicle</h2>
    <ul id="chronicle" class="chronicle-list">
      <li class="chronicle-empty">Waiting for the first events…</li>
    </ul>
  </section>

  <section class="roster-panel">
    <h2>Townsfolk</h2>
    <div id="roster" class="roster-grid"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
