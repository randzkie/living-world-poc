<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Living World — Aetheria RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">Æ</div>
      <div>
        <h1>Aetheria</h1>
        <p class="subtitle">A living world of AI characters</p>
      </div>
    </div>
    <div class="status">
      <span id="tickCount" class="tick-badge">⏱ tick 0</span>
      <span id="timeBadge" class="tick-badge">☀ 6:00</span>
      <span class="status-pill" id="connPill">
        <span id="connDot" class="dot"></span>
        <span id="connLabel">connecting…</span>
      </span>
    </div>
  </header>

  <main class="layout">
    <div class="stage-wrap">
      <div class="card-header-red">
        <span>⚔ THE VILLAGE OF AETHERIA</span>
        <span class="hint">Scroll to zoom · Drag to pan · Click a character</span>
      </div>
      <div id="gameContainer" class="stage">
        <canvas id="gameCanvas" width="1000" height="640"></canvas>
        <!-- Zoom controls -->
        <div class="zoom-controls">
          <button id="zoomIn" title="Zoom in">+</button>
          <button id="zoomOut" title="Zoom out">−</button>
          <button id="zoomReset" title="Reset view">⊙</button>
        </div>
        <!-- Minimap -->
        <div id="minimap" class="minimap">
          <canvas id="minimapCanvas" width="180" height="120"></canvas>
        </div>
        <!-- Agent count badge -->
        <div id="agentBadge" class="agent-badge">0 characters</div>
      </div>

      <div class="card-header-red" style="margin-top:10px">
        <span>⚔ CHARACTERS</span>
        <span class="hint" id="charCount">0 villagers</span>
      </div>
      <div id="charCards" class="char-cards"></div>
    </div>

    <aside id="inspector" class="inspector">
      <div class="card-header-red">
        <span>⚔ CHARACTER DETAILS</span>
      </div>
      <div id="inspectorBody" class="inspector-body">
        <div class="inspector-empty">
          <div class="empty-icon">👁</div>
          <p>Click a character on the map to see their stats, plan, and memories.</p>
        </div>
      </div>
    </aside>
  </main>

  <script src="main.js"></script>
</body>
</html>
